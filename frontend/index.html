<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Control Panel</h1>
  <p>Click a device to control the system</p>

  <div class="grid">

    <div class="card">
      <img src="imagens/Wyrestorm_imagem.jpeg">
      <span>WyreStorm</span>
    </div>

    <div class="card">
      <img src="images/device2.jpg">
      <span>Device 2</span>
    </div>

    <div class="card">
      <img src="images/device3.jpg">
      <span>Device 3</span>
    </div>

    <div class="card">
      <img src="images/device4.jpg">
      <span>Device 4</span>
    </div>

  </div>

  <div class="status">
    <h3>Selected Device</h3>
    <p id="statusText">None</p>
  </div>

</div>


<script src="script.js"></script>

</body>
</html>
