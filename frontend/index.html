<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Control Panel</h1>
  <p>Click a device to control the system</p>

  <div class="grid">

    <div class="card">
      <img src="imagens/Wyrestorm_imagem.jpeg">
      <span>WyreStorm</span>
    </div>

    <div class="card">
      <img src="imagens/Projetor_imagem.jpeg">
      <span>Panasonic Projetor</span>
    </div>

    <div class="card">
      <img src="imagens/ound_Board_TF1.jpeg">
      <span>Yamaha TF1</span>
    </div>

    <div class="card">
      <img src="imagens/[P006561] DOLBY CP950 CINEMA PROCESSOR 16CH.webp">
      <span>Dolby</span>
    </div>

  </div>

  <div class="status">
    <h3>Selected Device</h3>
    <p id="statusText">None</p>
  </div>

</div>


<script src="script.js"></script>

</body>
</html>
